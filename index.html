<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aethelstan — AI Surface Diagnostic</title>
<link rel="canonical" href="https://aethelstan.co/">

<script type="application/ld+json">
{
 "@context": "https://schema.org",
 "@type": "Organization",
 "@id": "https://aethelstan.co/#organization",
 "name": "Aethelstan Systems",
 "url": "https://aethelstan.co/",
 "description": "Aethelstan is a public AI Surface diagnostic that evaluates structural identity clarity across AI systems."
}
</script>

<style>

* { margin:0; padding:0; box-sizing:border-box; }

html, body{
height:100%;
background:radial-gradient(circle at center,#0a0a0a 0%,#000000 70%);
font-family:Arial, Helvetica, sans-serif;
overflow:hidden;
color:#f3f3f3;
}

/* NAV */

nav{position:absolute; top:3vh; right:4vw;}
nav ul{list-style:none; display:flex; gap:28px;}

nav a{
text-decoration:none;
font-size:0.75rem;
letter-spacing:0.14em;
text-transform:uppercase;
color:#bdbdbd;
transition:color .2s ease;
}

nav a:hover{
color:#ffffff;
text-decoration:underline;
}

/* HERO */

.hero{
height:100vh;
width:100vw;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.monument{
font-weight:700;
font-size:clamp(44px,6.5vw,92px);
letter-spacing:0.18em;
line-height:1.05;
text-transform:uppercase;
white-space:nowrap;
}

/* INPUT */

.instrument{margin-top:3.5vh; display:flex;}

.instrument input{
width:400px;
max-width:70vw;
padding:14px 18px;
background:transparent;
border:2px solid #1f1f1f;
color:#ffffff;
font-size:0.95rem;
outline:none;
}

.instrument input::placeholder{
color:#555;
letter-spacing:0.08em;
}

.instrument button{
padding:14px 26px;
border:2px solid #1f1f1f;
border-left:none;
background:transparent;
color:#ffffff;
font-size:0.8rem;
letter-spacing:0.12em;
text-transform:uppercase;
cursor:pointer;
transition:all .2s ease;
}

.instrument button:hover{
background:#ffffff;
color:#000;
border-color:#ffffff;
}

/* FOOTER */

.identity-anchor{
position:absolute;
bottom:3vh;
left:4vw;
font-size:0.7rem;
letter-spacing:0.14em;
text-transform:uppercase;
color:#6a6a6a;
}

/* DASHBOARD */

.dashboard{
position:absolute;
top:0;
left:0;
height:100vh;
width:100vw;
background:#000;
padding:6vh 6vw;
display:flex;
flex-direction:column;
opacity:0;
transition:opacity .4s ease;
}

.dashboard.visible{opacity:1;}
.hidden{display:none;}

.dashboard-header{margin-bottom:4vh;}

.back-btn{
background:transparent;
border:1px solid #444;
color:#aaa;
padding:8px 14px;
cursor:pointer;
font-size:0.7rem;
letter-spacing:0.12em;
text-transform:uppercase;
}

.back-btn:hover{
border-color:#fff;
color:#fff;
}

/* SCORE */

.score-panel{margin-bottom:6vh;}

.score-value{
font-size:72px;
font-weight:bold;
}

.score-band{
font-size:18px;
letter-spacing:0.14em;
margin-top:8px;
color:#888;
}

.score-meta{
margin-top:12px;
font-size:0.75rem;
color:#666;
}

/* GRID */

.dimension-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:24px;
}

.dimension-card{
border:1px solid #222;
padding:18px;
background:#0a0a0a;
cursor:pointer;
}

.dimension-card.active{border-color:#444;}

.dimension-title{
font-size:0.75rem;
letter-spacing:0.14em;
margin-bottom:12px;
color:#888;
}

.dimension-score{
font-size:28px;
}

/* EXPAND */

.dimension-details{
margin-top:14px;
font-size:0.75rem;
color:#888;
}

.dimension-check{
display:flex;
justify-content:space-between;
padding:3px 0;
}

.dimension-check span:last-child{color:#aaa;}

</style>
</head>

<body>

<nav>
<ul>
<li><a href="surface-diagnostic.html">Surface Diagnostic</a></li>
<li><a href="faq.html">FAQ</a></li>
<li><a href="about.html">About</a></li>
</ul>
</nav>

<main class="hero">

<h1 class="monument">AI SURFACE DIAGNOSTIC</h1>

<form class="instrument" id="scanForm">
<input type="text" id="domainInput" placeholder="Enter domain" required>
<button type="submit">Run Diagnostic</button>
</form>

</main>

<section id="dashboard" class="dashboard hidden">

<div class="dashboard-header">
<button id="newScanBtn" class="back-btn">← New Scan</button>
</div>

<div class="dashboard-content">

<div class="score-panel">
<div class="score-value" id="scoreValue">--</div>
<div class="score-band" id="scoreBand">--</div>
<div class="score-meta" id="pagesLoaded">--</div>
</div>

<div class="dimension-grid" id="dimensionGrid"></div>

</div>

</section>

<div class="identity-anchor">
AETHELSTAN SYSTEMS — AI SURFACE DIAGNOSTIC
</div>

<script>

const form=document.getElementById("scanForm");
const input=document.getElementById("domainInput");

const dashboard=document.getElementById("dashboard");
const newScanBtn=document.getElementById("newScanBtn");

const scoreValue=document.getElementById("scoreValue");
const scoreBand=document.getElementById("scoreBand");
const pagesLoaded=document.getElementById("pagesLoaded");

const dimensionGrid=document.getElementById("dimensionGrid");

function showDashboard(){
dashboard.classList.remove("hidden");
setTimeout(()=>{dashboard.classList.add("visible");},10);
}

function hideDashboard(){
dashboard.classList.remove("visible");
setTimeout(()=>{dashboard.classList.add("hidden");},400);
}

newScanBtn.addEventListener("click",()=>{hideDashboard();});

form.addEventListener("submit",async(e)=>{

e.preventDefault();

const domain=input.value.trim();
if(!domain) return;

try{

const response=await fetch(
"https://aethelstan-api.onrender.com/v1/scan",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({domain})
}
);

const data=await response.json();

if(!response.ok){
alert(data.detail||"Error");
return;
}

scoreValue.textContent=data.composite_score;
scoreBand.textContent=data.band;
pagesLoaded.textContent=`Pages Loaded: ${data.pages_loaded}`;

dimensionGrid.innerHTML="";

Object.entries(data.dimensions).forEach(([name,details])=>{

const card=document.createElement("div");
card.className="dimension-card";

card.innerHTML=`
<div class="dimension-title">${name.replace(/_/g," ")}</div>
<div class="dimension-score">${details.score}</div>
<div class="dimension-details hidden"></div>
`;

const detailsDiv=card.querySelector(".dimension-details");

card.addEventListener("click",()=>{

const open=!detailsDiv.classList.contains("hidden");

document.querySelectorAll(".dimension-details").forEach(d=>{
d.classList.add("hidden");
d.innerHTML="";
});

document.querySelectorAll(".dimension-card").forEach(c=>{
c.classList.remove("active");
});

if(open) return;

card.classList.add("active");
detailsDiv.classList.remove("hidden");

const checks=details.checks||details.flags||{};

Object.entries(checks).forEach(([check,value])=>{

const row=document.createElement("div");
row.className="dimension-check";

row.innerHTML=`
<span>${check.replace(/_/g," ")}</span>
<span>${value?"✓":"✕"}</span>
`;

detailsDiv.appendChild(row);

});

});

dimensionGrid.appendChild(card);

});

showDashboard();

}catch(err){

console.error(err);
alert("Network error.");

}

});

</script>

</body>
</html>
